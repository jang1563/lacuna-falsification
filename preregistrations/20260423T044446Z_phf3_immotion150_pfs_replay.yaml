# Pre-registration artifact — Theory Copilot Phase F
#
# Committed once and never modified. Any subsequent edit of this file
# invalidates the pre-registration (verifiable via `git log -p <file>`).
# This file is the machine-readable form of the FDA-EMA 2026-01 'credibility
# assessment plan' applied to a single symbolic-regression hypothesis.

hypothesis_id: phf3_immotion150_pfs_replay
emitted_at_utc: 2026-04-23T04:44:46Z
emitted_git_sha: 7dcc1025859a
retroactive: false
analyst: theory-copilot-team
data_cutoff_date: 2026-04-23
dataset_context: immotion150

law_family_name: 'External replay of TOP2A-EPAS1 on IMmotion150 metastatic ccRCC'
template_id: phf3_immotion150_pfs_replay
symbolic_template: 'TOP2A - EPAS1'
initial_guess: 'TOP2A - EPAS1'
biological_rationale: "The survivor law TOP2A - EPAS1 cleared the pre-registered 5-test gate on TCGA-KIRC metastasis (M0 vs M1, AUROC 0.726, Delta_baseline +0.069). This pre-registration asks whether the same linear-combination score stratifies progression-free survival (PFS) in a fully independent, metastatic-only cohort (IMmotion150 Phase-2 atezolizumab +/- bevacizumab, n=263, Nat Med 2018). Biological prediction: patients whose tumor's proliferation program (TOP2A) runs ahead of HIF-2alpha (EPAS1) progress faster, consistent with the ccA/ccB axis of Brannon 2010 (PMID 20871783) and Brooks 2014 ClearCode34 (DOI 10.1016/j.eururo.2014.02.035)."
target_features: ["TOP2A", "EPAS1"]
negative_control: false

# Expected verdict under the 5-test gate (kept pristine from the
# pre-hackathon law_proposals.json entry).
expected_verdict: UNKNOWN

# Deterministic kill-test thresholds. By default these mirror the
# 5-test binary-classification gate in src/theory_copilot/falsification.py
# (a change to that file invalidates every classification pre-reg).
# When `uses_kill_tests_override: true`, the hypothesis is not a binary
# classification and the tests below are hypothesis-specific (e.g.
# log-rank + hazard-ratio for a survival-analysis replay).
uses_kill_tests_override: true
kill_tests:
  - name: logrank_median_split
    description: Median-split TOP2A-EPAS1 score into high vs low. Log-rank test on Kaplan-Meier PFS curves.
    statistic: logrank_chi_squared_p_value
    threshold: < 0.05
    two_sided: True
  - name: cox_hazard_ratio
    description: Univariate Cox proportional-hazards regression on continuous TOP2A-EPAS1 score. HR is reported per unit standardized score (z-score within cohort).
    statistic: hazard_ratio_per_z
    threshold_for_pass: HR_95CI excludes 1.0 AND abs(log(HR)) > log(1.3)
    threshold_explanation: Requires both statistical significance (CI excludes 1) and an effect size equivalent to >= 30 percent change in hazard per z-score unit — a conservative bar that prevents a barely-significant-but-tiny-effect pass.
  - name: concordance_index
    description: Harrell C-index for the continuous score against PFS with censoring.
    statistic: c_index
    threshold: > 0.55
    threshold_explanation: 0.5 is chance; 0.55 is a weak-but-meaningful discrimination floor. Survivor C-index on the training cohort is ~0.61 for reference.

multiple_testing_correction: benjamini_hochberg_fdr
alpha: 0.05
stopping_rule: |
  Stop as soon as the 5-test gate returns a verdict (PASS/FAIL). No
  post-hoc threshold adjustment, no re-analysis under new thresholds,
  no cherry-picking a different p-value correction.

