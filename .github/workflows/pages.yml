name: Deploy to GitHub Pages

# PhF-4 (updated 2026-04-26): deploys the Lacuna static site to GitHub Pages.
# Site structure:
#   /              → web/index.html  (main dashboard — beautiful landing page)
#   /demo.html     → web/demo.html   (Loom demo companion + visual walkthrough)
#   /story.html    → web/story.html  (discovery story — the falsification narrative)
#   /rejection-log.html → rendered rejection log (all 203 gate verdicts)
#   /immotion150_pfs/   → KM plot + verdict JSON for the IMmotion150 survival replay

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'results/**/*.json'
      - 'src/render_rejection_log.py'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Render rejection log
        run: python src/render_rejection_log.py

      - name: Assemble site
        run: |
          mkdir -p _site

          # ── Main pages (from web/) ──
          cp web/index.html   _site/index.html
          cp web/demo.html    _site/demo.html
          cp web/story.html   _site/story.html

          # ── Rejection log (rendered from JSON) ──
          cp results/rejection_log.html _site/rejection-log.html

          # ── IMmotion150 KM plot + verdict JSON ──
          mkdir -p _site/immotion150_pfs
          cp -r results/track_a_task_landscape/external_replay/immotion150_pfs/* _site/immotion150_pfs/ || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
