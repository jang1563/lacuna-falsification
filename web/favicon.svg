<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="32" height="32">
  <!--
    Lacuna favicon — v3 mark geometry (split-L, 32×32 output)
    Source: lacuna_mark_dark_v3.svg (500×500). Browser scales via viewBox.
  -->
  <rect width="500" height="500" fill="#141413"/>

  <!-- TOP CAP — exterior corners rounded, fracture face hard -->
  <path d="M 140,100 L 192,100 Q 202,100 202,110 L 202,214 L 130,214 L 130,110 Q 130,100 140,100 Z" fill="#faf9f5"/>

  <!-- BOTTOM VERT — fracture face hard, exterior corners rounded -->
  <path d="M 130,294 L 202,294 L 202,390 Q 202,400 192,400 L 140,400 Q 130,400 130,390 Z" fill="#faf9f5"/>

  <!-- HORIZ FOOT — interior top-left hard, exterior corners rounded -->
  <path d="M 130,328 L 360,328 Q 370,328 370,338 L 370,390 Q 370,400 360,400 L 140,400 Q 130,400 130,390 L 130,328 Z" fill="#faf9f5"/>
</svg>